
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Undertale and Deltarune</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #000;
            color: #fff;
            font-family: 'Roboto', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        #game-selection {
            text-align: center;
        }
        #game-selection h1 {
            font-size: 2.5em;
            margin-bottom: 1em;
        }
        .game-button {
            background-color: #333;
            border: 2px solid #555;
            color: #fff;
            padding: 15px 30px;
            font-size: 1.2em;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.3s, transform 0.2s;
            margin: 10px;
        }
        .game-button:hover {
            background-color: #444;
            transform: scale(1.05);
        }
        #game-frame {
            display: none;
            border: 0;
            width: 100vw;
            height: 100vh;
            position: fixed;
            top: 0;
            left: 0;
        }
        #mobile-controls {
            display: none;
            position: fixed;
            bottom: 20px;
            left: 0;
            width: 100%;
            height: auto;
            background: transparent;
            z-index: 10;
            justify-content: space-between;
            align-items: flex-end;
            padding: 0 20px;
            box-sizing: border-box;
            pointer-events: none;
        }
        #joystick {
            position: relative;
            width: 120px;
            height: 120px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 50%;
            border: 2px solid rgba(255, 255, 255, 0.2);
            pointer-events: auto;
        }
        #joystick-handle {
            position: absolute;
            left: 30px;
            top: 30px;
            width: 60px;
            height: 60px;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 50%;
        }
        #action-buttons {
            position: fixed;
            bottom: 20px;
            right: 20px;
        }
        .action-button {
            position: absolute;
            width: 60px;
            height: 60px;
            font-size: 1.5em;
            border-radius: 50%;
            background-color: rgba(0, 0, 0, 0.4);
            border: 2px solid rgba(255, 255, 255, 0.2);
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            pointer-events: auto;
        }
        #button-z {
            bottom: 0;
            right: 0;
        }
        #button-x {
            bottom: 30px;
            right: 70px;
        }
        #button-c {
            bottom: 60px;
            right: 140px;
        }
        .action-button.pressed {
            background-color: rgba(255, 255, 255, 0.4);
            transform: scale(0.95);
        }
    </style>
</head>
<body>
    <div id="game-selection">
        <button class="game-button" onclick="loadGame('Deltarune-HTML-main/index.html')">Deltarune</button>
        <button class="game-button" onclick="loadGame('Undertale-HTML-main/index.html')">Undertale</button>
    </div>

    <iframe id="game-frame"></iframe>

    <div id="mobile-controls">
        <div id="joystick">
            <div id="joystick-handle"></div>
        </div>
        <div id="action-buttons">
            <div id="button-c" class="action-button">c</div>
            <div id="button-x" class="action-button">X</div>
            <div id="button-z" class="action-button">z</div>
        </div>
    </div>

    <script src="error_remover.js"></script>
    <script>
        const gameSelection = document.getElementById('game-selection');
        const gameFrame = document.getElementById('game-frame');
        const mobileControls = document.getElementById('mobile-controls');

        function loadGame(url) {
            gameSelection.style.display = 'none';
            gameFrame.src = url;
            gameFrame.style.display = 'block';
            gameFrame.focus();

            if (url.includes('Undertale')) {
                gameFrame.addEventListener('load', () => {
                    try {
                        const innerDoc = gameFrame.contentDocument || gameFrame.contentWindow.document;
                        Object.defineProperty(innerDoc.navigator, 'userAgent', { 
                            get: function() { return 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/91.0.4472.124 Safari/537.36'; }
                        });
                    } catch (e) {
                        // ignore
                    }
                }, { once: true });
            }
        }

        if (/Mobi|Android/i.test(navigator.userAgent)) {
            mobileControls.style.display = 'flex';
        }

        const joystick = document.getElementById('joystick');
        const handle = document.getElementById('joystick-handle');
        const buttonZ = document.getElementById('button-z');
        const buttonX = document.getElementById('button-x');
        const buttonC = document.getElementById('button-c');

        const keyMap = {
            'ArrowUp': { key: 'ArrowUp', code: 'ArrowUp', keyCode: 38 },
            'ArrowDown': { key: 'ArrowDown', code: 'ArrowDown', keyCode: 40 },
            'ArrowLeft': { key: 'ArrowLeft', code: 'ArrowLeft', keyCode: 37 },
            'ArrowRight': { key: 'ArrowRight', code: 'ArrowRight', keyCode: 39 },
            'z': { key: 'z', code: 'KeyZ', keyCode: 90 },
            'x': { key: 'x', code: 'KeyX', keyCode: 88 },
            'c': { key: 'c', code: 'KeyC', keyCode: 67 }
        };

        let keys = {};
        let joystickTouchId = null;

        function dispatchKeyEvent(type, keyIdentifier) {
            const keyInfo = keyMap[keyIdentifier];
            if (!keyInfo) return;

            const event = new KeyboardEvent(type, {
                key: keyInfo.key,
                code: keyInfo.code,
                keyCode: keyInfo.keyCode,
                which: keyInfo.keyCode,
                bubbles: true,
                cancelable: true
            });

            if (gameFrame.contentWindow) {
                const elements = [
                    gameFrame.contentWindow,
                    gameFrame.contentWindow.document,
                    gameFrame.contentWindow.document.body,
                    gameFrame.contentWindow.document.getElementById('canvas')
                ].filter(Boolean);
                elements.forEach(el => el.dispatchEvent(event));
            }
        }

        function updateJoystick(x, y) {
            const rect = joystick.getBoundingClientRect();
            const centerX = rect.left + rect.width / 2;
            const centerY = rect.top + rect.height / 2;
            const deltaX = x - centerX;
            const deltaY = y - centerY;
            let angle = Math.atan2(deltaY, deltaX);
            let distance = Math.sqrt(deltaX * deltaX + deltaY * deltaY);

            if (distance > rect.width / 4) {
                distance = rect.width / 4;
            }

            const handleX = distance * Math.cos(angle);
            const handleY = distance * Math.sin(angle);
            handle.style.transform = `translate(${handleX}px, ${handleY}px)`;

            const angleDeg = angle * 180 / Math.PI;
            let newKeys = { ArrowUp: false, ArrowDown: false, ArrowLeft: false, ArrowRight: false };

            if (joystickTouchId !== null) {
                if (angleDeg > -112.5 && angleDeg < -67.5) {
                    newKeys.ArrowUp = true;
                } else if (angleDeg > -67.5 && angleDeg < -22.5) {
                    newKeys.ArrowUp = true;
                    newKeys.ArrowRight = true;
                } else if (angleDeg > -22.5 && angleDeg < 22.5) {
                    newKeys.ArrowRight = true;
                } else if (angleDeg > 22.5 && angleDeg < 67.5) {
                    newKeys.ArrowRight = true;
                    newKeys.ArrowDown = true;
                } else if (angleDeg > 67.5 && angleDeg < 112.5) {
                    newKeys.ArrowDown = true;
                } else if (angleDeg > 112.5 && angleDeg < 157.5) {
                    newKeys.ArrowDown = true;
                    newKeys.ArrowLeft = true;
                } else if (angleDeg > 157.5 || angleDeg < -157.5) {
                    newKeys.ArrowLeft = true;
                } else if (angleDeg > -157.5 && angleDeg < -112.5) {
                    newKeys.ArrowLeft = true;
                    newKeys.ArrowUp = true;
                }
            }

            for (const key in newKeys) {
                if (newKeys[key] && !keys[key]) {
                    dispatchKeyEvent('keydown', key);
                    keys[key] = true;
                } else if (!newKeys[key] && keys[key]) {
                    dispatchKeyEvent('keyup', key);
                    keys[key] = false;
                }
            }
        }

        function handleTouchStart(e) {
            if (/Mobi|Android/i.test(navigator.userAgent)) {
                if (!document.fullscreenElement) {
                    document.documentElement.requestFullscreen().catch(() => {});
                }
            }

            for (const touch of e.changedTouches) {
                const target = touch.target;
                if (target === joystick || joystick.contains(target)) {
                    e.preventDefault();
                    if (joystickTouchId === null) {
                        joystickTouchId = touch.identifier;
                        updateJoystick(touch.clientX, touch.clientY);
                    }
                } else if (target.classList.contains('action-button')) {
                    e.preventDefault();
                    const key = target.id.replace('button-', '');
                    target.classList.add('pressed');
                    dispatchKeyEvent('keydown', key);
                    keys[key] = true;
                    target.dataset.touchId = touch.identifier;
                }
            }
        }

        function handleTouchMove(e) {
            for (const touch of e.changedTouches) {
                if (touch.identifier === joystickTouchId) {
                    e.preventDefault();
                    updateJoystick(touch.clientX, touch.clientY);
                }
            }
        }

        function handleTouchEnd(e) {
            for (const touch of e.changedTouches) {
                if (touch.identifier === joystickTouchId) {
                    e.preventDefault();
                    joystickTouchId = null;
                    handle.style.transform = 'translate(0px, 0px)';
                    const directions = ['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'];
                    directions.forEach(key => {
                        if (keys[key]) {
                            dispatchKeyEvent('keyup', key);
                            keys[key] = false;
                        }
                    });
                } else {
                    const buttons = document.querySelectorAll('.action-button');
                    for(const button of buttons){
                        if(button.dataset.touchId == touch.identifier){
                            e.preventDefault();
                            const key = button.id.replace('button-', '');
                            button.classList.remove('pressed');
                            dispatchKeyEvent('keyup', key);
                            keys[key] = false;
                            delete button.dataset.touchId;
                        }
                    }
                }
            }
        }

        window.addEventListener('touchstart', handleTouchStart, { passive: false });
        window.addEventListener('touchmove', handleTouchMove, { passive: false });
        window.addEventListener('touchend', handleTouchEnd, { passive: false });
        window.addEventListener('touchcancel', handleTouchEnd, { passive: false });
    </script>
</body>
</html>
