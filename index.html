
<!DOCTYPE html>
<html>
<head>
    <title>Game Launcher</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
        }
        #game-selection {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
        }
        #mobile-controls {
            display: none;
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 200px;
            background: transparent;
            touch-action: none;
            z-index: 10; /* Make sure it's on top */
        }
        #joystick {
            position: absolute;
            left: 100px;
            top: 50%;
            transform: translateY(-50%);
            width: 100px;
            height: 100px;
            background: rgba(255,255,255,0.3);
            border-radius: 50%;
        }
        #joystick-handle {
            position: absolute;
            left: 25px;
            top: 25px;
            width: 50px;
            height: 50px;
            background: rgba(255,255,255,0.7);
            border-radius: 50%;
        }
        #action-buttons {
            position: absolute;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
        }
        #action-buttons button {
            display: block;
            margin: 10px;
            width: 60px;
            height: 60px;
            font-size: 24px;
        }
        #game-frame {
            display: none;
            border: 0;
            width: 100vw;
            height: 100vh;
            position: fixed;
            top: 0;
            left: 0;
        }
    </style>
</head>
<body>
    <div id="game-selection">
        <h1>Choose a game to play:</h1>
        <button onclick="loadGame('Deltarune-HTML-main/index.html')">Deltarune</button>
        <button onclick="loadGame('Undertale-HTML-main/index.html')">Undertale</button>
    </div>

    <iframe id="game-frame"></iframe>

    <div id="mobile-controls">
        <div id="joystick">
            <div id="joystick-handle"></div>
        </div>
        <div id="action-buttons">
            <button id="button-z">Z</button>
            <button id="button-x">X</button>
            <button id="button-c">C</button>
        </div>
    </div>

    <script>
        const gameSelection = document.getElementById('game-selection');
        const gameFrame = document.getElementById('game-frame');

        function loadGame(url) {
            gameSelection.style.display = 'none';
            gameFrame.src = url;
            gameFrame.style.display = 'block';
            gameFrame.focus();
        }

        if (/Mobi|Android/i.test(navigator.userAgent)) {
            document.getElementById('mobile-controls').style.display = 'block';
        }

        const joystick = document.getElementById('joystick');
        const handle = document.getElementById('joystick-handle');
        const buttonZ = document.getElementById('button-z');
        const buttonX = document.getElementById('button-x');
        const buttonC = document.getElementById('button-c');

        const keyMap = {
            'ArrowUp': { key: 'ArrowUp', code: 'ArrowUp', keyCode: 38 },
            'ArrowDown': { key: 'ArrowDown', code: 'ArrowDown', keyCode: 40 },
            'ArrowLeft': { key: 'ArrowLeft', code: 'ArrowLeft', keyCode: 37 },
            'ArrowRight': { key: 'ArrowRight', code: 'ArrowRight', keyCode: 39 },
            'z': { key: 'z', code: 'KeyZ', keyCode: 90 },
            'x': { key: 'x', code: 'KeyX', keyCode: 88 },
            'c': { key: 'c', code: 'KeyC', keyCode: 67 }
        };

        let joystickActive = false;
        let keys = {};

        function pressKey(keyIdentifier) {
            const keyInfo = keyMap[keyIdentifier];
            if (!keyInfo || keys[keyIdentifier]) return;
            keys[keyIdentifier] = true;
            if (gameFrame.contentWindow) {
                gameFrame.contentWindow.focus();
                const event = new KeyboardEvent('keydown', {
                    key: keyInfo.key,
                    code: keyInfo.code,
                    keyCode: keyInfo.keyCode,
                    which: keyInfo.keyCode,
                    bubbles: true,
                    cancelable: true
                });
                gameFrame.contentWindow.dispatchEvent(event);
            }
        }

        function releaseKey(keyIdentifier) {
            const keyInfo = keyMap[keyIdentifier];
            if (!keyInfo || !keys[keyIdentifier]) return;
            keys[keyIdentifier] = false;
            if (gameFrame.contentWindow) {
                gameFrame.contentWindow.focus();
                 const event = new KeyboardEvent('keyup', {
                    key: keyInfo.key,
                    code: keyInfo.code,
                    keyCode: keyInfo.keyCode,
                    which: keyInfo.keyCode,
                    bubbles: true,
                    cancelable: true
                });
                gameFrame.contentWindow.dispatchEvent(event);
            }
        }
        
        handle.addEventListener('touchstart', (e) => {
            joystickActive = true;
        }, {passive: false});

        handle.addEventListener('touchmove', (e) => {
            if (!joystickActive) return;
            e.preventDefault();
            const rect = joystick.getBoundingClientRect();
            const x = e.touches[0].clientX - rect.left - rect.width / 2;
            const y = e.touches[0].clientY - rect.top - rect.height / 2;

            const angle = Math.atan2(y, x);
            const dist = Math.min(rect.width / 4, Math.sqrt(x*x + y*y));
            
            const handleX = dist * Math.cos(angle);
            const handleY = dist * Math.sin(angle);
            
            handle.style.transform = `translate(${handleX}px, ${handleY}px)`;

            const angleDeg = angle * 180 / Math.PI;

            let newKeys = {ArrowUp:false, ArrowLeft:false, ArrowDown:false, ArrowRight:false};

            if (angleDeg > -135 && angleDeg < -45) newKeys.ArrowUp = true; // up
            if (angleDeg > 45 && angleDeg < 135) newKeys.ArrowDown = true; // down
            if (angleDeg > 135 || angleDeg < -135) newKeys.ArrowLeft = true; // left
            if (angleDeg > -45 && angleDeg < 45) newKeys.ArrowRight = true; // right
            
            for (const key in newKeys) {
                if (newKeys[key] && !keys[key]) {
                    pressKey(key);
                } else if (!newKeys[key] && keys[key]) {
                    releaseKey(key);
                }
            }
        }, {passive: false});

        handle.addEventListener('touchend', (e) => {
            joystickActive = false;
            handle.style.transform = 'translate(0,0)';
            releaseKey('ArrowUp');
            releaseKey('ArrowLeft');
            releaseKey('ArrowDown');
            releaseKey('ArrowRight');
        });

        buttonZ.addEventListener('touchstart', () => pressKey('z'), {passive: false});
        buttonZ.addEventListener('touchend', () => releaseKey('z'));
        buttonX.addEventListener('touchstart', () => pressKey('x'), {passive: false});
        buttonX.addEventListener('touchend', () => releaseKey('x'));
        buttonC.addEventListener('touchstart', () => pressKey('c'), {passive: false});
        buttonC.addEventListener('touchend', () => releaseKey('c'));
    </script>
</body>
</html>
