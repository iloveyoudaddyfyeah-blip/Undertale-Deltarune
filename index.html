
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Undertale and Deltarune</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #000;
            color: #fff;
            font-family: 'Roboto', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        #game-selection {
            text-align: center;
        }
        #game-selection h1 {
            font-size: 2.5em;
            margin-bottom: 1em;
        }
        .game-button {
            background-color: #333;
            border: 2px solid #555;
            color: #fff;
            padding: 15px 30px;
            font-size: 1.2em;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.3s, transform 0.2s;
            margin: 10px;
        }
        .game-button:hover {
            background-color: #444;
            transform: scale(1.05);
        }
        #game-frame {
            display: none;
            border: 0;
            width: 100vw;
            height: 100vh;
            position: fixed;
            top: 0;
            left: 0;
        }
        #mobile-controls {
            display: none;
            position: fixed;
            bottom: 20px;
            left: 0;
            width: 100%;
            height: auto;
            background: transparent;
            z-index: 10;
            justify-content: space-between;
            align-items: flex-end;
            padding: 0 20px;
            box-sizing: border-box;
            pointer-events: none;
        }
        #joystick {
            position: relative;
            width: 120px;
            height: 120px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 50%;
            border: 2px solid rgba(255, 255, 255, 0.2);
            pointer-events: auto;
        }
        #joystick-handle {
            position: absolute;
            left: 30px;
            top: 30px;
            width: 60px;
            height: 60px;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 50%;
        }
        #action-buttons {
            position: fixed;
            bottom: 20px;
            right: 20px;
        }
        .action-button {
            position: absolute;
            width: 60px;
            height: 60px;
            font-size: 1.5em;
            border-radius: 50%;
            background-color: rgba(0, 0, 0, 0.4);
            border: 2px solid rgba(255, 255, 255, 0.2);
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            pointer-events: auto;
        }
        #button-z {
            bottom: 0;
            right: 0;
        }
        #button-x {
            bottom: 30px;
            right: 70px;
        }
        #button-c {
            bottom: 60px;
            right: 140px;
        }
        .action-button.pressed {
            background-color: rgba(255, 255, 255, 0.4);
            transform: scale(0.95);
        }
    </style>
</head>
<body>
    <div id="game-selection">
        <button class="game-button" onclick="loadGame('Deltarune-HTML-main/index.html')">Deltarune</button>
        <button class="game-button" onclick="loadGame('Undertale-HTML-main/index.html')">Undertale</button>
    </div>

    <iframe id="game-frame"></iframe>

    <div id="mobile-controls">
        <div id="joystick">
            <div id="joystick-handle"></div>
        </div>
        <div id="action-buttons">
            <div id="button-z" class="action-button">Z</div>
            <div id="button-x" class="action-button">X</div>
            <div id="button-c" class="action-button">C</div>
        </div>
    </div>

    <script src="error_remover.js"></script>
    <script src="script.js"></script>
</body>
</html>
